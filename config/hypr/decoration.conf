decoration {
    rounding = 12

    active_opacity = 0.96
    inactive_opacity = 0.90
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = $shadow
    }

    blur {
        enabled = true
        size = 8
        passes = 2
        new_optimizations = true
        xray = false
        ignore_opacity = false
    }
}

general {
    col.active_border = $border_active
    col.inactive_border = $border_inactive
}