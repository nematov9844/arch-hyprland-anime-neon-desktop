background {
    monitor =
    path = screenshot
    blur_passes = 2
    blur_size = 6
    noise = 0.01
    contrast = 0.9
    brightness = 0.8
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +%H:%M)"
    font_size = 72
    font_family = Sans
    color = rgb(e5e7eb)

    position = 0, 120
    halign = center
    valign = top
    zindex = 10
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +%A,\ %d\ %B\ %Y)"
    font_size = 20
    font_family = Sans
    color = rgb(cbd5e1)

    position = 0, 178
    halign = center
    valign = top
    zindex = 10
}

input-field {
    monitor =
    size = 360, 56
    outline_thickness = 2
    outer_color = rgb(8b5cf6)
    inner_color = rgba(17, 24, 39, 0.75)
    font_color = rgb(f9fafb)
    fade_on_empty = false
    rounding = 14
    placeholder_text = <i>Enter Password</i>
    fail_text = <b>Wrong password</b>
    check_text = <i>Checking...</i>
    fail_color = rgb(ef4444)
    check_color = rgb(f59e0b)

    position = 0, 170
    halign = center
    valign = bottom
    zindex = 10
}
