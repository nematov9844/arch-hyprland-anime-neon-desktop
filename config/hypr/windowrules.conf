# ==============================
# Window Rules
# Arch Hyprland Anime Neon Desktop
# ==============================

# Common utility apps
windowrule {
    name = float-center-pavucontrol
    match:class = ^(pavucontrol)$

    float = on
    center = on
    size = 60% 70%
}

windowrule {
    name = float-center-blueman
    match:class = ^(blueman-manager)$

    float = on
    center = on
    size = 70% 75%
}

windowrule {
    name = float-center-network-editor
    match:class = ^(nm-connection-editor)$

    float = on
    center = on
    size = 70% 75%
}

windowrule {
    name = float-center-calculator
    match:class = ^(org\.gnome\.Calculator)$

    float = on
    center = on
    size = 40% 55%
}

# Authentication dialogs
windowrule {
    name = float-center-polkit
    match:class = ^(polkit-gnome-authentication-agent-1|hyprpolkitagent)$

    float = on
    center = on
}

# File picker / portal dialogs
windowrule {
    name = dialogs-float-center
    match:modal = true

    float = on
    center = on
}

# Picture in Picture
windowrule {
    name = picture-in-picture
    match:title = ^(Picture-in-Picture)$

    float = on
    pin = on
    size = 25% 25%
}

# Media viewers
windowrule {
    name = mpv-float
    match:class = ^(mpv)$

    float = on
    center = on
}

# Make some common apps open larger if floating
windowrule {
    name = thunar-large-float
    match:class = ^(thunar)$
    match:float = true

    size = 75% 80%
}

# Better behavior for xwayland popups
windowrule {
    name = xwayland-dialogs
    match:xwayland = true
    match:modal = true

    float = on
    center = on
}